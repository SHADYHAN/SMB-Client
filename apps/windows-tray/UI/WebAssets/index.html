<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RYNAT</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main id="login-screen" class="login-screen">
      <section class="login-card">
        <div class="login-gear">R</div>
        <h1>RYNAT 共享网盘</h1>
        <p id="login-server-label" class="login-server">默认服务器：加载中</p>

        <form id="login-form" class="login-form">
          <label class="field">
            <span>用户名</span>
            <input id="username" autocomplete="username" />
          </label>
          <label class="field">
            <span>密码</span>
            <input id="password" type="password" autocomplete="current-password" />
          </label>
          <div class="option-row">
            <label class="check-row">
              <input id="remember-password" type="checkbox" />
              <span>记住密码</span>
            </label>
            <label class="check-row">
              <input id="auto-login" type="checkbox" />
              <span>自动登录</span>
            </label>
          </div>
          <button class="primary-button wide" type="submit">登录</button>
        </form>

        <p id="login-hint" class="hint-text"></p>
      </section>
    </main>

    <main id="app-screen" class="app-shell hidden">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">R</div>
          <div>
            <strong>RYNAT</strong>
            <span>Windows</span>
          </div>
        </div>

        <nav class="nav">
          <button id="nav-server" class="nav-item active" type="button" data-page="server">服务器</button>
          <button id="nav-general" class="nav-item" type="button" data-page="general">通用</button>
        </nav>

        <div class="sidebar-footer">
          <span id="service-dot" class="service-dot"></span>
          <span id="service-label">服务启动中</span>
        </div>
      </aside>

      <section class="content">
        <header class="topbar">
          <div>
            <p class="eyebrow">Explorer-first</p>
            <h1 id="page-title">服务器</h1>
          </div>
          <div class="topbar-actions">
            <button id="open-explorer" class="secondary-button" type="button">打开资源管理器</button>
            <button id="hide-button" class="ghost-button" type="button">最小化</button>
          </div>
        </header>

        <section id="server-page" class="page-grid">
          <section class="panel">
            <div class="panel-heading row-heading">
              <div>
                <h2>服务器列表</h2>
                <p>登录页会使用默认服务器。服务器地址变更时，会清空该服务器已保存的用户名和密码。</p>
              </div>
              <button id="add-server" class="secondary-button" type="button">新增服务器</button>
            </div>
            <div id="server-list" class="server-list"></div>
          </section>

          <section class="panel">
            <div class="panel-heading">
              <h2 id="server-form-title">编辑服务器</h2>
              <p>设置默认服务器后，登录页只需要输入用户名和密码。</p>
            </div>
            <form id="server-form" class="form-grid">
              <input id="server-id" type="hidden" />
              <label class="field">
                <span>名称</span>
                <input id="server-name" autocomplete="off" />
              </label>
              <label class="field">
                <span>服务器地址</span>
                <input id="server-host" autocomplete="off" />
              </label>
              <label class="check-row">
                <input id="server-set-default" type="checkbox" />
                <span>设为默认服务器</span>
              </label>
              <div class="action-row">
                <button class="primary-button" type="submit">保存服务器</button>
                <button id="delete-server" class="ghost-button danger" type="button">删除</button>
              </div>
            </form>
          </section>

          <section class="panel span-2">
            <div class="panel-heading">
              <h2>当前连接</h2>
              <p id="connected-summary">服务器状态正常。</p>
            </div>
            <div class="action-row">
              <button id="copy-test-link" class="secondary-button" type="button">复制临时文件夹 123</button>
              <button id="copy-material-test-link" class="secondary-button" type="button">复制 Pro 素材 B</button>
              <button id="copy-second-material-test-link" class="secondary-button" type="button">复制 Pro 素材 E</button>
              <button id="disconnect" class="ghost-button" type="button">退出登录</button>
            </div>
            <dl class="status-grid">
              <div>
                <dt>服务器</dt>
                <dd id="state-host">-</dd>
              </div>
              <div>
                <dt>用户</dt>
                <dd id="state-user">-</dd>
              </div>
              <div>
                <dt>SMB 会话</dt>
                <dd id="state-smb-session">-</dd>
              </div>
              <div>
                <dt>短链服务</dt>
                <dd id="state-redirect">-</dd>
              </div>
              <div>
                <dt>右键 IPC</dt>
                <dd id="state-context">-</dd>
              </div>
              <div>
                <dt>最近动作</dt>
                <dd id="last-activation">暂无</dd>
              </div>
            </dl>
          </section>
        </section>

        <section id="general-page" class="page-grid hidden">
          <section class="panel">
            <div class="panel-heading">
              <h2>启动与快捷键</h2>
              <p>这些设置后续会由正式安装包和系统热键接管。</p>
            </div>
            <form id="general-form" class="form-grid">
              <label class="check-row">
                <input id="start-with-windows" type="checkbox" />
                <span>开机自动启动 RYNAT</span>
              </label>
              <label class="field">
                <span>复制分享链接快捷键</span>
                <input id="copy-link-hotkey" autocomplete="off" placeholder="未设置" />
              </label>
              <button class="primary-button" type="submit">保存通用设置</button>
            </form>
          </section>

          <section class="panel">
            <div class="panel-heading">
              <h2>运行状态</h2>
              <p id="status-text">加载中</p>
            </div>
            <div class="log-line" id="general-last-activation">暂无</div>
          </section>
        </section>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
